<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto de Botones</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        #buttons-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        .button {
            cursor: pointer;
            padding: 10px 20px;
            border: 1px solid #333;
            border-radius: 5px;
            background: #e0e0e0;
            font-size: 14px;
            transition: all 0.2s;
        }

        .button:hover {
            background: #d0d0d0;
            transform: scale(1.05);
        }

        .button:active {
            transform: scale(0.95);
        }

        img.button {
            width: 100px;
            height: 100px;
            padding: 5px;
            border: 1px solid #999;
        }
    </style>
</head>
<body>
    <h1>Simulación de Botones</h1>
    <div id="buttons-container"></div>
    <script type="module" src="./dist/main.js"></script>
</body>
</html>
